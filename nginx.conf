# FLUXION Unified Gateway — Nginx Reverse Proxy
# Routes all traffic through a single port (80)
#
# /api/*    → Simulation API    (port 8000)
# /auth/*   → Simulation API    (port 8000, auth router)
# /ws/*     → Simulation API    (port 8000, WebSocket)
# /live/*   → Live Bridge API   (port 8001)
# /*        → Next.js Dashboard (port 3000)

upstream simulation_api {
    server api:8000;
}

upstream live_bridge {
    server bridge:8001;
}

upstream dashboard {
    server dashboard:3000;
}

server {
    listen 80;
    server_name localhost;

    # ── Simulation API ────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://simulation_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Auth endpoints ────────────────────────────────────────────────
    location /auth/ {
        proxy_pass http://simulation_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── WebSocket ─────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://simulation_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ── Live Bridge API ───────────────────────────────────────────────
    location /live/ {
        proxy_pass http://live_bridge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Next.js Dashboard (default) ───────────────────────────────────
    location / {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Next.js HMR WebSocket (dev mode) ──────────────────────────────
    location /_next/webpack-hmr {
        proxy_pass http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
